name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    name: governance
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Driven-By field
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" | grep -qE "Driven-By|Source:"

  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ["1.22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify module graph
        run: |
          go mod tidy
          git diff --exit-code

      - name: Check gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          files=$(git ls-files '*.go')
          if [ -n "$files" ]; then
            bad=$(gofmt -l $files)
            if [ -n "$bad" ]; then
              echo "gofmt needed on:"
              echo "$bad"
              exit 1
            fi
          fi

      - name: Run tests
        run: go test ./... -count=1

      - name: Run vet
        run: go vet ./...

      - name: Run race tests (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./... -count=1

      - name: Install staticcheck
        if: matrix.os == 'ubuntu-latest'
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck (linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export PATH="${PATH}:$(go env GOPATH)/bin"
          staticcheck ./...

      - name: Verify binary and CLI smoke
        run: |
          set -euo pipefail
          bin="$(mktemp)"
          trap 'rm -f "$bin"' EXIT
          go build -o "$bin" ./cmd/wbot
          "$bin" -version
          "$bin" master -duration 1ms 2>/dev/null
          "$bin" agent -duration 1ms -interval 1ms
          "$bin" paper -symbol V.US -side buy
